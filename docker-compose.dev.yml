services:
  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
    command: npm run start:dev
    ports:
      - '3003:3003'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:3003/api
      WATCHPACK_POLLING: 'true'
      CHOKIDAR_USEPOLLING: 'true'
    command: npm run dev -- --hostname 0.0.0.0 --port 3004
    ports:
      - '3004:3004'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  backend_node_modules:
  frontend_node_modules:
